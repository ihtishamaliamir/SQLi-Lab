{% extends "base.html" %}
{% block title %}SQL Injection Labs – Home{% endblock %}
{% block content %}
<h1>🛡️ Web Security Academy</h1>
<p style="color: var(--text-muted); margin-bottom: 2rem;">SQL Injection Labs (1–8) – exactly as in PortSwigger. Exploit each lab to mark it solved.</p>

<div class="lab-grid">
    {% for i in range(1,9) %}
    <a href="/lab{{ i }}" class="lab-card" data-lab="{{ i }}">
        <h3>Lab {{ i }}</h3>
        <div class="lab-status">
            <span id="status-{{ i }}" class="unsolved-mark">Not solved</span>
        </div>
    </a>
    {% endfor %}
</div>

<button class="reset-btn" onclick="if(confirm('Reset database and solved status?')) { localStorage.clear(); fetch('/reset').then(() => location.reload()); }">Reset All (DB + solved flags)</button>

<script>
    function updateHomeStatus() {
        let solved = JSON.parse(localStorage.getItem('solvedLabs') || '{}');
        for (let i=1; i<=8; i++) {
            let span = document.getElementById(`status-${i}`);
            if (span) {
                if (solved[i]) {
                    span.textContent = '✓ Solved';
                    span.className = 'solved-mark';
                } else {
                    span.textContent = 'Not solved';
                    span.className = 'unsolved-mark';
                }
            }
        }
    }
    updateHomeStatus();
</script>
{% endblock %}
