<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SQLi Labs{% endblock %}</title>
    <script src="/static/solved.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            padding: 2rem;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e2e8f0;
        }
        .nav-left a {
            text-decoration: none;
            color: #4a5568;
            font-weight: 600;
            margin-right: 1.5rem;
        }
        .nav-left a:hover {
            color: #667eea;
        }
        .solved-badge {
            background: linear-gradient(135deg, #48bb78, #2f855a);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        h2 {
            font-size: 1.5rem;
            border-left: 5px solid #667eea;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
            color: #2d3748;
        }
        form {
            background: #f7fafc;
            padding: 1rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        input, button {
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            font-size: 1rem;
        }
        input {
            flex: 1;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            transform: scale(1.02);
        }
        .query {
            background: #2d3748;
            color: #fbbf24;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-family: monospace;
            margin: 1rem 0;
            overflow-x: auto;
        }
        .products, .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0;
        }
        .product, .result-card {
            background: white;
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            transition: all 0.2s;
            border: 1px solid #edf2f7;
        }
        .product:hover, .result-card:hover {
            transform: translateY(-4px);
        }
        .price {
            color: #48bb78;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .lab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        .lab-card {
            background: linear-gradient(135deg, #f7fafc, #edf2f7);
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            text-decoration: none;
            color: #2d3748;
            transition: all 0.2s;
        }
        .lab-card:hover {
            transform: scale(1.03);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .solved-mark {
            color: #48bb78;
            font-weight: bold;
        }
        .unsolved-mark {
            color: #a0aec0;
        }
        .reset-btn {
            background: linear-gradient(135deg, #f56565, #c53030);
            margin-top: 1rem;
        }
        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #2d3748;
            background: rgba(102, 126, 234, 0.1);
            padding: 1rem;
            border-radius: 0.5rem;
        }
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 0.5rem;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="nav-left">
                <a href="/">🏠 Home</a>
                {% if request.endpoint and 'lab' in request.endpoint %}
                <a href="javascript:history.back()">← Back</a>
                {% endif %}
            </div>
            <div class="nav-right">
                {% if solved is defined and solved %}
                <span class="solved-badge">✓ SOLVED</span>
                {% endif %}
            </div>
        </div>

        {% block content %}{% endblock %}
        
        <footer>
            SQL Injection Lab - By Ihtisham, Sadiq, Awais, Aizaz
        </footer>
    </div>
</body>
</html>
